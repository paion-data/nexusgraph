---
name: Nexus Graph CI/CD

"on":
  workflow_call:
  pull_request:
  push:
    branches:
      - master

env:
  USER: QubitPi
  EMAIL: jack20220723@gmail.com
  HASHICORP_PRODUCT_VERSION: "latest"

  ENTITY_EXTRACTION_CALL_DELAY_IN_MS: 5000

jobs:
  yaml-lint:
    name: YAML Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actionshub/yamllint@main
  markdown-lint:
    name: Markdown Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actionshub/markdownlint@main
  markdown-link-check:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-verbose-mode: "yes"
  code-style:
    name: Code Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set node version to 16
        uses: actions/setup-node@v3
        with:
          node-version: 16
      - name: Install dependencies
        run: |
          yarn install
          cd docs && yarn install && cd ../
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
      - name: Code style check
        run: yarn prettier . --check
      - name: ESLint
        run: yarn eslint .

  unit-tests:
    name: Unit Tests
    needs: [yaml-lint, markdown-lint, markdown-link-check, code-style]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node_version: [16]
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set node version to ${{ matrix.node_version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node_version }}
      - name: Install dependencies
        run: |
          yarn install
          cd packages/nexusgraph-server
          yarn install
      - name: Run unit tests
        run: yarn test

  e2e-tests:
    needs: [yaml-lint, markdown-lint, markdown-link-check, code-style]
    uses: paion-data/github-actions-workflows/.github/workflows/cypress-e2e-tests.yml@master

  release:
    name: Publish NPM Packages
    if: github.ref == 'refs/heads/master'
    needs: [unit-tests, e2e-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set node version to 16
        uses: actions/setup-node@v3
        with:
          node-version: 16
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - name: Tag for release
        run: |
          git config --global user.name '$USER'
          git config --global user.email '$EMAIL'
          .github/tag-for-release.bash
      - name: Set release version
        run: |
          VERSION=$(git describe)
          npm version $VERSION
      - name: Publish to NPM Packages
        run: |
          npm config set '//registry.npmjs.org/:_authToken' "${NPM_TOKEN}"
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  documentation-ci-cd:
    name: Test and Deploy Documentation to GitHub Pages
    needs: [unit-tests, e2e-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16
      - name: Install nexusgraph dependencies so that TypeDoc process source files properly
        run: |
          cd ../
          yarn install
          cd packages/nexusgraph-server
          yarn install
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
      - name: Install doc dependencies
        run: yarn install
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
      - name: Build documentation
        run: yarn build
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build
          enable_jekyll: false
          user_name: ${{ env.USER }}
          user_email: ${{ env.EMAIL }}

  hashicorp:
    name: Publish All nexusgraph AMI Images and Deploy Them to EC2 through HashiCorp
    needs: [unit-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Load SSL Certificates
        run: |
          echo '${{ secrets.AWS_APP_NEXUSGRAPH_COM_CRT_FILE }}' > ./aws-app-nexusgraph-com.crt
          echo '${{ secrets.AWS_APP_NEXUSGRAPH_COM_CRT_KEY_FILE }}' > ./aws-app-nexusgraph-com.key
        working-directory: hashicorp/images
      - name: Load Nginx config
        run: echo '${{ secrets.AWS_APP_NEXUSGRAPH_COM_NGINX_CONF_FILE }}' > ./app-nexusgraph-com-nginx.conf
        working-directory: hashicorp/images
      - name: Load .env file
        run: echo '${{ secrets.AWS_APP_NEXUSGRAPH_COM_ENV_FILE }}' > ./app-nexusgraph-com.env
        working-directory: hashicorp/images
      - name: Load Packer var file
        run: echo '${{ secrets.AWS_APP_NEXUSGRAPH_COM_AUTO_PKRVARS_FILE }}' > ./app-nexusgraph-com.auto.pkrvars.hcl
        working-directory: hashicorp/images
      - name: Load Terraform var file
        run: echo '${{ secrets.AWS_APP_NEXUSGRAPH_COM_AUTO_TFVARS_FILE }}' > ./app-nexusgraph-com.auto.tfvars
        working-directory: hashicorp/instances

      - name: Publish all nexusgraph AMI images and deploy them to EC2 through HashiCorp
        uses: QubitPi/aergia@master
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
